query OrderListByStatus(
  $input: OrdersByStatusInput!
  $page: Int!
  $limit: Int!
) {
  orderListByStatus(input: $input, page: $page, limit: $limit) {
    items {
      id
      createdAt
      updatedAt
      userId
      user {
        userName
      }
      exchangeRateId
      exchangeRate {
        currencyCode
        assetType
        actionType
      }
      quantity
      status
    }
    meta {
      total
      page
      limit
    }
  }
}
